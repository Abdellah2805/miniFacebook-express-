<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mini Facebook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-4">Mini Facebook </h1>
        
        <div id="auth-section" class="card p-4 shadow-sm mb-4">
            <h3>Connexion</h3>
            <input type="text" id="login-username" class="form-control mb-2" placeholder="Nom d'utilisateur">
            <input type="password" id="login-password" class="form-control mb-2" placeholder="Mot de passe">
            <button onclick="login()" class="btn btn-primary">Se connecter</button>
        </div>

        <div id="post-section" class="card p-4 shadow-sm mb-4 d-none">
            <h3>Quoi de neuf ?</h3>
            <textarea id="post-content" class="form-control mb-2" placeholder="Exprimez-vous..."></textarea>
            <button onclick="createPost()" class="btn btn-success">Publier</button>
        </div>

        <div id="feed">
            <h3>Fil d'actualité</h3>
            <div id="posts-container"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
